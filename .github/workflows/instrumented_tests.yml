name: Instrumented Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/src/androidTest/**'
      - 'app/src/main/**'
      - '.github/workflows/instrumented_tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/src/androidTest/**'
      - 'app/src/main/**'
      - '.github/workflows/instrumented_tests.yml'
  workflow_dispatch: # Allow manual triggering

jobs:
  instrumented-tests:
    runs-on: macos-14 # macOS required for Android emulator support
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Create AVD and generate snapshot for faster emulator creation
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29 # Android 10 - good balance of features and speed
        arch: x86_64
        profile: Nexus 6
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: false
        script: |
          echo "Emulator is ready"
          adb devices
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
    
    - name: Run instrumented tests
      run: ./gradlew connectedAndroidTest --console=plain
      # This step will fail if any test fails, causing the CI job to fail
    
    - name: Show test summary
      if: always()
      run: |
        chmod +x test-summary.sh
        CI=true ./test-summary.sh || true
        # Show instrumented test results if available
        if [ -d "app/build/test-results/androidTests" ]; then
          echo ""
          echo "=== Instrumented Test Results ==="
          find app/build/test-results/androidTests -name "*.xml" -exec grep -l "testcase" {} \; | head -5
        fi
    
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: instrumented-test-report
        path: |
          app/build/reports/androidTests/
          app/build/test-results/androidTests/
        retention-days: 7
    
    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: |
          app/build/test-results/androidTests/**/*.xml
        check_name: Instrumented Test Results
        comment_mode: always
        report_individual_runs: false
        compare_to_previous_run: false
