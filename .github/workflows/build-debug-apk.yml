name: Build Debug APK

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build debug APK
        run: ./gradlew assembleDebug
      
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Comment PR with download link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 Debug APK Build Complete

            A debug APK has been built for this PR and is available for download.

            **Download:** Go to the [workflow run](${artifactUrl}) and download the \`app-debug-apk\` artifact.

            **Installation:**
            1. Copy the APK file to your device (via USB, email, cloud storage, etc.)
            2. On your device:
               - Open the file manager
               - Navigate to where you saved the APK
               - Tap the APK file
               - If prompted, allow installation from "Unknown Sources" (Settings → Security → Unknown Sources)
               - Tap "Install"

            The APK will be available for 30 days.`
            });
